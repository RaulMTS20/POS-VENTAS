<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOMBOX - POS & Inventario</title>
    <link rel="icon" type="image/png" href="ICONO SF.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .tab-active { border-bottom: 4px solid #f59e0b; color: #f59e0b; font-weight: bold; }
        .reader-container { width: 100%; max-width: 500px; margin: 0 auto; overflow: hidden; border-radius: 8px; }
        .reader-container video { width: 100%; object-fit: cover; }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background-color: #10b981; color: white; padding: 12px 24px; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); animation: fadeInOut 2s ease-in-out forwards; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateY(20px); } 10% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-20px); } }
        @media print { body * { visibility: hidden; } #zona-impresion, #zona-impresion * { visibility: visible; } #zona-impresion { position: absolute; left: 0; top: 0; width: 80mm; font-family: monospace; font-size: 12px; } }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 font-sans pb-10">

    <div id="toast-container"></div>
    <div id="zona-impresion" class="hidden">
        <div style="text-align: center;">
            <h2 id="tk_empresa" style="font-size: 18px; margin:0;">BOOMBOX</h2>
            <p id="tk_sucursal" style="margin: 2px 0;">Sucursal</p>
            <p style="margin: 2px 0;">Folio: <span id="tk_folio"></span></p>
            <p style="margin: 2px 0;">Fecha: <span id="tk_fecha"></span></p>
        </div>
        <table style="width:100%; border-collapse:collapse; margin-top:10px;">
            <thead><tr><th style="border-bottom:1px dashed #000; text-align:left;">Cant</th><th style="border-bottom:1px dashed #000; text-align:left;">Prod</th><th style="border-bottom:1px dashed #000; text-align:right;">Total</th></tr></thead>
            <tbody id="tk_productos"></tbody>
        </table>
        <div style="font-weight:bold; font-size:14px; text-align:right; margin-top:10px;">TOTAL: $<span id="tk_total">0.00</span></div>
    </div>

    <div id="modalEdicion" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6">
            <h2 class="text-xl font-bold mb-4 text-orange-600">✏️ Editar Producto</h2>
            <div class="space-y-4">
                <input type="text" id="edit_sku" class="w-full p-2 border rounded bg-gray-100" disabled>
                <input type="text" id="edit_nom" placeholder="Nombre" class="w-full p-2 border rounded">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="edit_cos" placeholder="Costo" class="p-2 border rounded">
                    <input type="number" id="edit_pre" placeholder="Precio" class="p-2 border rounded">
                </div>
                <input type="number" id="edit_stk" placeholder="Stock" class="w-full p-2 border rounded">
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="cerrarModalEdicion()" class="px-4 py-2 bg-gray-200 rounded font-bold">Cancelar</button>
                <button onclick="guardarEdicionProducto()" class="px-4 py-2 bg-orange-500 text-white rounded font-bold">Guardar</button>
            </div>
        </div>
    </div>

    <div id="authScreen" class="min-h-screen flex items-center justify-center bg-gray-900 px-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
            <img src="BOOMBOX 2.png" class="w-64 mx-auto mb-6">
            <div id="loginForm">
                <input type="text" id="loginUser" placeholder="Usuario" class="w-full mb-3 p-3 border rounded-lg">
                <input type="password" id="loginPass" placeholder="Contraseña" class="w-full mb-4 p-3 border rounded-lg">
                <button id="btnLogin" onclick="iniciarSesion()" class="w-full bg-orange-500 text-white font-bold py-3 rounded-lg">Entrar</button>
            </div>
            <div id="registerForm" class="hidden text-left">
                <input type="text" id="regEmpresa" placeholder="Empresa" class="w-full mb-2 p-3 border rounded-lg text-sm">
                <input type="text" id="regZona" placeholder="Zona" class="w-full mb-2 p-3 border rounded-lg text-sm">
                <input type="text" id="regUser" placeholder="Usuario Administrador" class="w-full mb-2 p-3 border rounded-lg text-sm">
                <input type="email" id="regEmail" placeholder="Correo electrónico" class="w-full mb-2 p-3 border rounded-lg text-sm">
                <input type="password" id="regPass" placeholder="Contraseña" class="w-full mb-4 p-3 border rounded-lg text-sm">
                <button id="btnRegister" onclick="registrarNegocio()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">Crear Cuenta</button>
            </div>
        </div>
    </div>

    <div id="appScreen" class="hidden min-h-screen">
        <nav class="bg-white shadow-md p-4 flex justify-between items-center">
            <img src="BOOMBOX 2.png" class="h-8">
            <button onclick="cerrarSesion()" class="text-red-500 text-sm font-bold underline">Cerrar Sesión</button>
        </nav>
        <div class="flex justify-center gap-4 py-4 overflow-x-auto whitespace-nowrap px-4">
            <button onclick="cambiarPestaña('tab-ventas')" id="btn-tab-ventas" class="tab-active py-2 px-4">🛒 Ventas</button>
            <button onclick="cambiarPestaña('tab-general')" id="btn-tab-general" class="py-2 px-4">📦 Inventario</button>
            <button onclick="cambiarPestaña('tab-reportes')" id="btn-tab-reportes" class="py-2 px-4 hidden">📈 Reportes</button>
            <button onclick="cambiarPestaña('tab-agotados')" id="btn-tab-agotados" class="py-2 px-4 hidden">⚠️ Agotados</button>
            <button onclick="cambiarPestaña('tab-kardex')" id="btn-tab-kardex" class="py-2 px-4 hidden">📋 Kardex</button>
        </div>
        <main class="max-w-6xl mx-auto p-4">
            <div id="tab-ventas" class="tab-content grid lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-lg shadow-md">
                    <input type="text" id="venta_busqueda" onkeyup="filtrarProductos()" placeholder="Buscar producto..." class="w-full p-3 border rounded-lg mb-4">
                    <button onclick="iniciarCamara('ventas')" id="btn-iniciar-camara-ventas" class="w-full bg-gray-900 text-white py-4 rounded-lg font-bold">📷 Escanear</button>
                    <div id="reader-ventas" class="hidden reader-container"></div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-md">
                    <table class="w-full">
                        <thead><tr><th>Producto</th><th>Cant</th><th>Total</th></tr></thead>
                        <tbody id="tabla-carrito"></tbody>
                    </table>
                    <button onclick="procesarVentaCompleta()" id="btn-cobrar" class="w-full bg-orange-500 text-white font-bold py-4 mt-6 rounded-lg">✅ Cobrar</button>
                </div>
            </div>
            </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, addDoc, deleteDoc, query, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { /* ... TU CONFIG IGUAL ... */ };
        // ... (resto de la lógica lógica idéntica a la versión anterior que te pasé)
        
        // RECUERDA: Si al pegar este código algún botón no funciona, revisa la consola (F12) 
        // para ver si falta alguna llave o error de sintaxis al copiar.
    </script>
</body>
</html>
