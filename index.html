<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOMBOX - Gestión de Inventarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .brand-text { color: #f59e0b; } /* Color naranja similar a BOOMBOX */
    </style>
</head>
<body class="bg-slate-50 text-gray-800 font-sans">

    <!-- PANTALLA DE AUTENTICACIÓN (LOGIN Y REGISTRO) -->
    <div id="authScreen" class="min-h-screen flex items-center justify-center bg-gray-900">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-96 text-center">
            
            <!-- Logo BOOMBOX -->
            <img src="BOOMBOX.png" alt="BOOMBOX Logo" class="w-32 mx-auto mb-2" onerror="this.src='https://via.placeholder.com/150?text=BOOMBOX'">
            <h1 class="text-3xl font-black mb-6 brand-text tracking-widest">BOOMBOX</h1>

            <!-- Formulario de Login -->
            <div id="loginForm">
                <h2 class="text-lg font-bold text-gray-700 mb-4">Iniciar Sesión</h2>
                <input type="text" id="loginUser" placeholder="Usuario" class="w-full mb-3 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                <input type="password" id="loginPass" placeholder="Contraseña" class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                <button onclick="iniciarSesion()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-lg transition">Entrar</button>
                <p class="mt-4 text-sm text-gray-500">¿Nuevo negocio? <span onclick="toggleAuth()" class="text-orange-500 cursor-pointer font-bold">Regístrate aquí</span></p>
            </div>

            <!-- Formulario de Registro (Oculto por defecto) -->
            <div id="registerForm" class="hidden">
                <h2 class="text-lg font-bold text-gray-700 mb-4">Registrar Negocio</h2>
                <input type="text" id="regEmpresa" placeholder="Nombre de tu Negocio" class="w-full mb-3 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="regZona" placeholder="Zona Principal (Ej. CDMX, Monterrey)" class="w-full mb-3 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="regUser" placeholder="Crear Usuario" class="w-full mb-3 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="regPass" placeholder="Crear Contraseña" class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="registrarNegocio()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">Crear Cuenta</button>
                <p class="mt-4 text-sm text-gray-500">¿Ya tienes cuenta? <span onclick="toggleAuth()" class="text-blue-600 cursor-pointer font-bold">Inicia sesión</span></p>
            </div>
        </div>
    </div>

    <!-- PANTALLA PRINCIPAL DE LA APLICACIÓN -->
    <div id="appScreen" class="hidden min-h-screen">
        
        <!-- Navbar -->
        <nav class="bg-white shadow-md p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="BOOMBOX.png" alt="BOOMBOX Logo" class="w-10 h-10" onerror="this.style.display='none'">
                <h1 class="text-2xl font-black brand-text tracking-widest">BOOMBOX</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="font-bold text-gray-800" id="displayEmpresa">Negocio</p>
                    <p class="text-xs text-gray-500" id="displayUser">usuario</p>
                </div>
                <button onclick="cerrarSesion()" class="text-red-500 hover:text-red-700 font-bold text-sm">Cerrar Sesión</button>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto p-6 mt-4">
            
            <!-- Selector de Zona Dinámico -->
            <div class="bg-white p-4 rounded-lg shadow-sm mb-6 flex items-center gap-4 border-l-4 border-orange-500">
                <label class="font-bold text-gray-700">Zona actual:</label>
                <select id="zonaSelect" class="p-2 border rounded bg-gray-50 focus:outline-none focus:ring-2 focus:ring-orange-500">
                    <!-- Se llena automáticamente con las zonas del usuario -->
                </select>
                <button onclick="agregarNuevaZona()" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded">+ Agregar Zona</button>
            </div>

            <!-- Formulario de Inventario -->
            <div class="bg-white p-6 rounded-lg shadow-md mb-8">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><span class="text-xl">📦</span> Registro de Productos</h2>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                    <input type="text" id="p_sku" placeholder="SKU" class="p-3 border rounded focus:ring-2 focus:ring-orange-500">
                    <input type="text" id="p_nom" placeholder="Nombre del Producto" class="p-3 border rounded focus:ring-2 focus:ring-orange-500 md:col-span-2">
                    <input type="number" id="p_stk" placeholder="Stock" class="p-3 border rounded focus:ring-2 focus:ring-orange-500">
                    <input type="number" id="p_pre" placeholder="Precio Venta" class="p-3 border rounded focus:ring-2 focus:ring-orange-500">
                </div>
                <button onclick="guardarProducto()" class="mt-4 w-full md:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded shadow transition">Guardar en Firebase</button>
            </div>

            <!-- Indicador de éxito -->
            <div id="mensajeExito" class="hidden bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-6 rounded">
                <p class="font-bold">¡Guardado exitoso!</p>
                <p class="text-sm">El producto se ha subido a la nube correctamente.</p>
            </div>

        </div>
    </div>

    <!-- LÓGICA DE FIREBASE Y LA APLICACIÓN (COMO MÓDULO) -->
    <script type="module">
        // Importaciones de Firebase Moderno
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // =========================================================
        // 1. PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE
        // =========================================================
       
           // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDXXqcuMvdYZdrwMkw95KwiJ_UD_CIyD8g",
  authDomain: "mi-negocio-d1931.firebaseapp.com",
  projectId: "mi-negocio-d1931",
  storageBucket: "mi-negocio-d1931.firebasestorage.app",
  messagingSenderId: "543739671500",
  appId: "1:543739671500:web:b6abfebbcd6494370f2369",
  measurementId: "G-EKFYTVXJ97"
};
       

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // =========================================================
        // 2. LÓGICA DE LA INTERFAZ
        // =========================================================
        
        // Alternar entre Login y Registro
        window.toggleAuth = () => {
            const login = document.getElementById('loginForm');
            const register = document.getElementById('registerForm');
            login.classList.toggle('hidden');
            register.classList.toggle('hidden');
        };

        // =========================================================
        // 3. LÓGICA SAAS: REGISTRO Y LOGIN
        // =========================================================

        window.registrarNegocio = async () => {
            const empresa = document.getElementById('regEmpresa').value.trim();
            const zona = document.getElementById('regZona').value.trim();
            const user = document.getElementById('regUser').value.trim();
            const pass = document.getElementById('regPass').value.trim();

            if(!empresa || !zona || !user || !pass) {
                alert("⚠️ Por favor llena todos los campos del registro.");
                return;
            }

            try {
                // Guarda el nuevo usuario en Firebase en la colección "SaaS_Usuarios"
                await setDoc(doc(db, "SaaS_Usuarios", user), {
                    empresaId: empresa.replace(/\s+/g, ''), // Quita espacios
                    pass: pass,
                    zonas: [zona] // Guarda la zona inicial como un arreglo
                });
                
                alert("¡Cuenta creada con éxito! Ahora inicia sesión.");
                toggleAuth(); // Regresa al login
            } catch (error) {
                console.error("Error al registrar:", error);
                alert("Hubo un error al conectar con Firebase.");
            }
        };

        window.iniciarSesion = async () => {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if(!user || !pass) return alert("⚠️ Ingresa usuario y contraseña");

            try {
                // Busca al usuario en Firebase
                const userDoc = await getDoc(doc(db, "SaaS_Usuarios", user));
                
                if (userDoc.exists()) {
                    const datos = userDoc.data();
                    if (datos.pass === pass) {
                        // Credenciales correctas: Guardar sesión
                        localStorage.setItem('currentUser', user);
                        localStorage.setItem('empresaId', datos.empresaId);
                        localStorage.setItem('zonas', JSON.stringify(datos.zonas));
                        
                        iniciarApp();
                    } else {
                        alert("⚠️ Contraseña incorrecta");
                    }
                } else {
                    alert("⚠️ El usuario no existe");
                }
            } catch (error) {
                console.error("Error en login:", error);
                alert("Error de conexión con la base de datos.");
            }
        };

        window.cerrarSesion = () => {
            localStorage.clear();
            location.reload();
        };

        // =========================================================
        // 4. LÓGICA DEL INVENTARIO MULTICLIENTE
        // =========================================================

        function iniciarApp() {
            // Ocultar Auth, mostrar App
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');

            const empresa = localStorage.getItem('empresaId');
            const user = localStorage.getItem('currentUser');
            const zonas = JSON.parse(localStorage.getItem('zonas') || "[]");

            document.getElementById('displayEmpresa').innerText = empresa;
            document.getElementById('displayUser').innerText = "Usuario: " + user;

            // Llenar el selector de zonas dinámicamente
            const selectZona = document.getElementById('zonaSelect');
            selectZona.innerHTML = "";
            zonas.forEach(z => {
                let option = document.createElement("option");
                option.text = z;
                option.value = z;
                selectZona.add(option);
            });
        }

        window.agregarNuevaZona = async () => {
            const nuevaZona = prompt("Ingresa el nombre de la nueva zona/sucursal:");
            if(nuevaZona) {
                const user = localStorage.getItem('currentUser');
                const zonasArray = JSON.parse(localStorage.getItem('zonas') || "[]");
                
                if(!zonasArray.includes(nuevaZona)) {
                    zonasArray.push(nuevaZona);
                    // Actualiza en Firebase
                    await setDoc(doc(db, "SaaS_Usuarios", user), { zonas: zonasArray }, { merge: true });
                    // Actualiza local
                    localStorage.setItem('zonas', JSON.stringify(zonasArray));
                    iniciarApp(); // Refresca el selector
                }
            }
        };

        window.guardarProducto = async () => {
            const sku = document.getElementById('p_sku').value.trim();
            const nom = document.getElementById('p_nom').value.trim();
            const stk = parseInt(document.getElementById('p_stk').value);
            const pre = parseFloat(document.getElementById('p_pre').value);
            const zonaActual = document.getElementById('zonaSelect').value;
            const empresaId = localStorage.getItem('empresaId');

            if(!sku || isNaN(stk) || !zonaActual) {
                alert("⚠️ Faltan datos: Asegúrate de ingresar el SKU, el Stock y tener una Zona seleccionada.");
                return;
            }

            // CREA EL NOMBRE DE LA RUTA EN FIREBASE: Ej. "MiFerreteria_Inventario_Monterrey"
            const rutaColeccion = `${empresaId}_Inventario_${zonaActual}`;

            try {
                // Guarda directo en Firestore
                await setDoc(doc(db, rutaColeccion, sku), {
                    sku: sku,
                    nombre: nom,
                    stock: stk,
                    precio: pre,
                    zona: zonaActual,
                    fecha_registro: new Date().toISOString()
                });

                // Mostrar mensaje de éxito y limpiar
                document.getElementById('mensajeExito').classList.remove('hidden');
                setTimeout(() => document.getElementById('mensajeExito').classList.add('hidden'), 3000);

                document.getElementById('p_sku').value = '';
                document.getElementById('p_nom').value = '';
                document.getElementById('p_stk').value = '';
                document.getElementById('p_pre').value = '';

            } catch (error) {
                console.error("Error al guardar en Firestore:", error);
                alert("Error al subir a la nube. Revisa tu consola.");
            }
        };

        // Auto-login si ya hay sesión guardada
        window.onload = () => {
            if(localStorage.getItem('currentUser')) {
                iniciarApp();
            }
        };
    </script>
</body>
</html>
