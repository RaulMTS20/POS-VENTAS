<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOMBOX - POS & Inventario</title>
    
    <link rel="icon" type="image/png" href="ICONO SF.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .brand-text { color: #f59e0b; }
        .tab-active { border-bottom: 4px solid #f59e0b; color: #f59e0b; font-weight: bold; }
        .reader-container { width: 100%; max-width: 400px; margin: 0 auto; }
        .reader-container video { width: 100%; border-radius: 8px; }
        
        /* Sistema de Notificaciones (Toast) */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background-color: #10b981; color: white; padding: 12px 24px; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); animation: fadeInOut 2s ease-in-out forwards; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateY(20px); } 10% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-20px); } }
        
        /* Estilos de Impresión (Ticket) */
        @media print {
            body * { visibility: hidden; }
            #zona-impresion, #zona-impresion * { visibility: visible; }
            #zona-impresion { position: absolute; left: 0; top: 0; width: 100%; max-width: 80mm; font-family: 'Courier New', Courier, monospace; font-size: 12px; color: black; margin: 0; padding: 10px; }
            .ticket-header { text-align: center; margin-bottom: 10px; }
            .ticket-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
            .ticket-table th, .ticket-table td { text-align: left; border-bottom: 1px dashed #ccc; padding: 4px 0; }
            .ticket-total { font-weight: bold; font-size: 14px; text-align: right; margin-top: 10px; }
        }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 font-sans">

    <div id="toast-container"></div>

    <div id="zona-impresion" class="hidden">
        <div class="ticket-header">
            <h2 id="tk_empresa" style="font-size: 18px; margin:0;">BOOMBOX</h2>
            <p id="tk_sucursal" style="margin: 2px 0;">Sucursal</p>
            <p style="margin: 2px 0;">Folio: <span id="tk_folio"></span></p>
            <p style="margin: 2px 0;">Fecha: <span id="tk_fecha"></span></p>
            <p style="margin: 2px 0;">Atendió: <span id="tk_cajero"></span></p>
        </div>
        <table class="ticket-table">
            <thead><tr><th>Cant</th><th>Producto</th><th>Importe</th></tr></thead>
            <tbody id="tk_productos"></tbody>
        </table>
        <div class="ticket-total">TOTAL: $<span id="tk_total">0.00</span></div>
        <p style="text-align: center; margin-top: 15px; font-size: 10px;">¡Gracias por su compra!</p>
    </div>

    <div id="modalEdicion" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 relative">
            <h2 class="text-xl font-bold mb-4 text-orange-600 border-b pb-2">✏️ Editar Inventario</h2>
            <div class="space-y-4">
                <div><label class="text-sm font-bold text-gray-600">SKU (No editable)</label><input type="text" id="edit_sku" class="w-full p-2 border rounded bg-gray-100 cursor-not-allowed" disabled></div>
                <div><label class="text-sm font-bold text-gray-600">Nombre del Producto</label><input type="text" id="edit_nom" class="w-full p-2 border rounded focus:ring-2 focus:ring-orange-500"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-sm font-bold text-gray-600">Costo ($)</label><input type="number" id="edit_cos" class="w-full p-2 border rounded focus:ring-2 focus:ring-orange-500"></div>
                    <div><label class="text-sm font-bold text-gray-600">Precio Venta ($)</label><input type="number" id="edit_pre" class="w-full p-2 border rounded focus:ring-2 focus:ring-orange-500"></div>
                </div>
                <div><label class="text-sm font-bold text-gray-600">Stock Actual</label><input type="number" id="edit_stk" class="w-full p-2 border rounded focus:ring-2 focus:ring-orange-500"></div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button type="button" onclick="cerrarModalEdicion()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded font-bold text-gray-700">Cancelar</button>
                <button type="button" onclick="guardarEdicionProducto()" class="px-4 py-2 bg-orange-500 hover:bg-orange-600 rounded font-bold text-white shadow">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <div id="authScreen" class="min-h-screen flex items-center justify-center bg-gray-900 px-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
            <div class="flex justify-center mb-8">
                <img src="BOOMBOX 2.png" alt="BOOMBOX Logo" class="w-80 md:w-96 h-auto object-contain">
            </div>
            
            <div id="loginForm">
                <h2 class="text-lg font-bold text-gray-700 mb-4">Iniciar Sesión</h2>
                <input type="text" id="loginUser" placeholder="Usuario (Ej. raulD2H)" class="w-full mb-3 p-3 border rounded-lg focus:ring-2 focus:ring-orange-500 font-bold text-lg">
                <input type="password" id="loginPass" placeholder="Contraseña" class="w-full mb-4 p-3 border rounded-lg focus:ring-2 focus:ring-orange-500">
                <button type="button" onclick="iniciarSesion()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-lg transition mb-4">Entrar</button>
                <button type="button" onclick="recuperarPassword()" class="text-sm text-blue-600 hover:underline">¿Olvidaste tu contraseña?</button>
                <p class="mt-4 text-sm text-gray-500 border-t pt-4">¿Nuevo negocio? <span onclick="toggleAuth()" class="text-orange-500 cursor-pointer font-bold">Regístrate aquí</span></p>
            </div>

            <div id="registerForm" class="hidden text-left">
                <h2 class="text-lg font-bold text-gray-700 mb-4 text-center">Registrar Negocio</h2>
                <label class="text
