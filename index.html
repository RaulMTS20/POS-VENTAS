<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOMBOX - POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-100 font-sans">

    <div id="app" class="max-w-md mx-auto mt-10 p-4 bg-white shadow-xl rounded-2xl">
        <img src="BOOMBOX SF.png" class="w-40 mx-auto mb-6">
        
        <h2 class="text-xl font-bold mb-4 text-center">Punto de Venta</h2>

        <div class="mb-6">
            <label class="block text-sm font-bold text-gray-600 mb-2">Ingresa el SKU manualmente:</label>
            <div class="flex gap-2">
                <input type="text" id="venta_sku" placeholder="Ej. 750100..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-orange-500">
                <button onclick="buscarProducto()" class="bg-blue-600 text-white px-4 rounded-lg font-bold">Buscar</button>
            </div>
        </div>

        <div class="text-center my-4 font-bold text-gray-400">--- O ---</div>

        <div class="mb-6">
            <button id="btn-iniciar" onclick="iniciarCamara()" class="w-full bg-black text-white py-3 rounded-lg font-bold flex items-center justify-center gap-2">
                📷 Escanear Código de Barras
            </button>
            <button id="btn-detener" onclick="detenerCamara()" class="hidden w-full bg-red-600 text-white py-3 rounded-lg font-bold mt-2">
                ❌ Cancelar Escaneo
            </button>
        </div>

        <div id="reader" class="hidden w-full overflow-hidden rounded-lg border-2 border-gray-200"></div>

        <div id="resultado" class="hidden mt-6 p-4 bg-orange-50 rounded-lg text-center">
            <p id="prod_nombre" class="font-bold text-lg"></p>
            <p id="prod_precio" class="text-green-600 font-bold text-xl"></p>
        </div>
    </div>

    <script>
        let html5QrCode;

        // --- FUNCIÓN PARA INICIAR CÁMARA ---
        function iniciarCamara() {
            document.getElementById('reader').classList.remove('hidden');
            document.getElementById('btn-iniciar').classList.add('hidden');
            document.getElementById('btn-detener').classList.remove('hidden');

            html5QrCode = new Html5QrCode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, // Cámara trasera
                { fps: 10, qrbox: { width: 250, height: 150 } },
                (decodedText) => {
                    // Cuando detecta el código
                    document.getElementById('venta_sku').value = decodedText;
                    detenerCamara(); // Cerrar cámara automáticamente al leer
                    buscarProducto(); // Buscar el producto leído
                },
                (errorMessage) => { /* Silencioso para no saturar al usuario */ }
            ).catch(err => {
                alert("No se pudo acceder a la cámara. Revisa los permisos.");
            });
        }

        // --- FUNCIÓN PARA DETENER CÁMARA ---
        function detenerCamara() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').classList.add('hidden');
                    document.getElementById('btn-iniciar').classList.remove('hidden');
                    document.getElementById('btn-detener').classList.add('hidden');
                }).catch(err => console.log("Error deteniendo"));
            }
        }

        // --- LÓGICA DE BÚSQUEDA ---
        function buscarProducto() {
            const sku = document.getElementById('venta_sku').value;
            if(!sku) return alert("Escribe un SKU o escanea un código.");
            
            // Aquí iría tu lógica de Firebase para buscar el producto
            // Ejemplo visual:
            document.getElementById('resultado').classList.remove('hidden');
            document.getElementById('prod_nombre').innerText = "Producto detectado: " + sku;
            document.getElementById('prod_precio').innerText = "$ 0.00";
        }
    </script>
</body>
</html>
